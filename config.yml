influxdb:
  host: '10.10.1.3'
  port: '8086'
  user: 'user'
  password: 'password'
  database: 'hpcc_metrics_phase2'

frequency: 60 # in seconds

bmc:
  timeout: 
    connect: 15
    read: 45
  ssl_verify: False   # Secure Sockets Layer Verify
  max_retries: 3
  iDRAC8_nodelist:
    - 10.101.1.[1-60]
    - 10.101.2.[1-60]
    - 10.101.3.[1-56]
    - 10.101.4.[1-48]
    - 10.101.5.[1-24]
    - 10.101.6.[1-20]
    - 10.101.7.[1-3, 5-60]
    - 10.101.8.[1-60]
    - 10.101.9.[1-60]
    - 10.101.10.[25-44]
  GPU_nodelist:
    - 10.101.20.[1-10]
    - 10.101.20.[11]
    - 10.101.21.[1-10]
  iDRAC9_nodelist:
    - 10.101.23.[1-60]
    - 10.101.24.[1-60]
    - 10.101.25.[1-60]
    - 10.101.26.[1-60]
  telemetry_report:   # Comment out to disable
     - PSUMetrics
     - PowerStatistics
     - PowerMetrics
     - SystemUsage
     - CPUMemMetrics
     - AggregationMetrics
     - ThermalSensor
     - ThermalMetrics
     - StorageSensor
     - StorageDiskSMARTData
     - Sensor
     - FCPortStatistics
     - FCSensor
     - NICStatistics
     - NICSensor
     - MemorySensor
     - SerialLog
     - CPUSensor
     - CPURegisters
     - FanSensor
     - GPUStatistics
     - NVMeSMARTData
     - GPUMetrics
     - FPGASensor
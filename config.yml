influxdb:
  host: '10.10.1.3'
  port: '8086'
  user: 'user'
  password: 'password'
  database: 'hpcc_metrics_phase2'

frequency: 60 # in seconds

bmc:
  timeout: 
    connect: 15
    read: 45
  ssl_verify: False   # Secure Sockets Layer Verify
  max_retries: 3
  iDRAC9_nodelist:
    - 10.101.23.[1-60]
    - 10.101.24.[1-60]
    - 10.101.25.[1-60]
    - 10.101.26.[1-60]
  telemetry_report:   # Comment out to disable
     - PSUMetrics
    #  - PowerStatistics
     - PowerMetrics
     - CUPS
     - CPUMemMetrics
     - AggregationMetrics
     - ThermalSensor
     - ThermalMetrics
     - StorageSensor
     - StorageDiskSMARTData
     - Sensor
     - FCSensor
     - NICStatistics
     - NICSensor
     - MemorySensor
     - SerialLog
     - CPUSensor
     - CPURegisters
     - FanSensor
    #  - GPUStatistics
     - NVMeSMARTData
    #  - GPUMetrics
    #  - FPGASensor